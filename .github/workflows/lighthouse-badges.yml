name: Lighthouse Badges

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC (edit if you want)
  page_build:

permissions:
  contents: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lighthouse
        run: npm i -g lighthouse

      - name: Run Lighthouse (mobile)
        run: |
          mkdir -p lighthouse_results
          lighthouse "https://nehasq.github.io" \
            --chrome-flags="--headless --no-sandbox --disable-gpu --disable-dev-shm-usage" \
            --preset=mobile \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output-path=lighthouse_results/mobile.json

      - name: Generate Shields endpoint JSON badges
        run: |
          node <<'NODE'
          const fs = require("fs");
          const report = JSON.parse(fs.readFileSync("lighthouse_results/mobile.json", "utf8"));
          const cats = report.categories;

          function pct(x) { return Math.round(x * 100); }
          function color(score) {
            if (score >= 90) return "brightgreen";
            if (score >= 75) return "yellow";
            if (score >= 50) return "orange";
            return "red";
          }

          const outDir = "badges";
          fs.mkdirSync(outDir, { recursive: true });

          const mapping = [
            ["performance", "Performance"],
            ["accessibility", "Accessibility"],
            ["best-practices", "Best Practices"],
            ["seo", "SEO"],
          ];

          for (const [key, label] of mapping) {
            const score = pct(cats[key].score);
            const badge = {
              schemaVersion: 1,
              label,
              message: String(score),
              color: color(score),
            };
            fs.writeFileSync(`${outDir}/lighthouse-${key}.json`, JSON.stringify(badge, null, 2) + "\n");
          }
          console.log("Badges written to /badges");
          NODE

      - name: Commit and push badge updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add badges/*.json lighthouse_results/mobile.json || true

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
            exit 0
          fi

          git commit -m "Update Lighthouse badges"
          git push